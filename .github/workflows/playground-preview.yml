name: Playground preview

# Builds the app (after `npm run build` so the Vite bundles are present) into a
# ZIP that Nextcloud Playground can install via the blueprint `installApp` step.
#
#   - push to master -> refresh the rolling `playground` prerelease asset
#                      (epubviewer.zip) that blueprint.json points at, so the
#                      README badge always boots the latest master.
#   - pull_request   -> publish a per-PR prerelease (playground-pr-<N>) and post
#                      a one-click playground link as a sticky PR comment.
#   - PR closed      -> delete that per-PR preview release and its tag.

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: playground-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  PLAYGROUND_URL: https://ateeducacion.github.io/nextcloud-playground/

jobs:
  build:
    # Build on push to master, and on open/sync/reopen of PRs from this repo.
    # Fork PRs run with a read-only token (no release write), so skip them.
    if: >-
      github.event_name == 'push' ||
      (github.event.action != 'closed' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve preview identity
        id: id
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=playground" >> "$GITHUB_OUTPUT"
            echo "version=playground" >> "$GITHUB_OUTPUT"
          else
            echo "tag=playground-pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "version=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build the app (Vite bundles + everything needed for viewer)
        run: npm run build

      - name: Build the playground ZIP
        run: |
          set -euo pipefail
          mkdir -p build/artifacts
          # Zip the tree after build. Leading "epubviewer/" folder is stripped by installApp.
          # Exclude only heavy/unneeded dev directories.
          (cd .. && zip -qr epubviewer/build/artifacts/epubviewer.zip epubviewer \
            -x "epubviewer/node_modules/*" \
            -x "epubviewer/.git/*" \
            -x "epubviewer/build/*" \
            -x "epubviewer/tests/*" \
            -x "epubviewer/screenshots/*" \
            -x "epubviewer/.github/*")
          ls -lh build/artifacts/epubviewer.zip
          # Also place a copy at root for the release upload step (matching action-gh-release usage)
          cp build/artifacts/epubviewer.zip epubviewer.zip

      - name: Publish epubviewer.zip to the preview release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.id.outputs.tag }}
          name: ${{ steps.id.outputs.tag }}
          prerelease: true
          make_latest: false
          files: epubviewer.zip
          fail_on_unmatched_files: true
          body: >
            Automated Nextcloud Playground preview build (not a real release).
            Installed in the browser via the blueprint `installApp` step.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Rewrite installApp URL + fixture raw URLs to point at this PR's release / commit
      # then inline the whole blueprint as base64 (?blueprint=) so the link works
      # without hosting per-PR blueprint files. We go through the CORS proxy because
      # GitHub release assets are served from Azure without ACAO headers.
      - name: Build PR playground link
        if: github.event_name == 'pull_request'
        id: link
        run: |
          set -euo pipefail
          asset="https://github-proxy.exelearning.dev/?repo=${{ github.repository }}&release=${{ steps.id.outputs.tag }}&asset=epubviewer.zip"
          jq --arg url "$asset" '(.steps[] | select(.step == "installApp")).url = $url' blueprint.json > blueprint.pr.json
          # Point sample fixtures at this PR's commit so added/changed samples are visible in the preview.
          sed -i "s#/devnoname120/epubviewer/master/tests/fixtures#/devnoname120/epubviewer/${{ github.event.pull_request.head.sha }}/tests/fixtures#g" blueprint.pr.json
          # Also support the fork owner in case the static blueprint used it temporarily
          sed -i "s#/erseco/epubviewer/master/tests/fixtures#/devnoname120/epubviewer/${{ github.event.pull_request.head.sha }}/tests/fixtures#g" blueprint.pr.json
          b64=$(base64 -w0 blueprint.pr.json | tr '+/' '-_' | tr -d '=')
          echo "url=${PLAYGROUND_URL}?blueprint=${b64}" >> "$GITHUB_OUTPUT"

      - name: Upsert PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.link.outputs.url }}
        with:
          script: |
            const marker = '<!-- playground-preview -->';
            const url = process.env.PREVIEW_URL;
            const button = 'https://raw.githubusercontent.com/ateeducacion/nextcloud-playground/refs/heads/main/assets/playground-preview-button.svg';
            const body = [
              marker,
              '### Preview this PR in the Nextcloud Playground',
              '',
              `<a href="${url}" target="_blank" rel="noopener noreferrer"><img src="${button}" alt="Open this PR in the Nextcloud Playground" width="224"></a>`,
              '',
              "A fresh Nextcloud boots in your browser with this branch's `epubviewer` app installed and enabled (log in as `admin` / `admin`). " +
                'Sample EPUB files are seeded under `epub-samples/` in Files — click one to open the viewer and test the reader (EPUB, night mode, search, etc.).',
              '',
              'The preview reflects the exact code and any new fixtures from this PR.',
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  cleanup:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Delete the per-PR preview release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="playground-pr-${{ github.event.pull_request.number }}"
          gh release delete "$tag" --cleanup-tag --yes || echo "No release $tag to delete."
